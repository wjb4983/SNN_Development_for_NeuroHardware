reproducibility:
  seed: 17

data:
  n_steps: 6000
  seed: 17

artifacts:
  slow_model_path: artifacts/hybrid/slow_ann.pkl
  fast_model_path: artifacts/hybrid/fast_snn.pkl
  fusion_model_path: artifacts/hybrid/fusion.pkl
  backtest_report_path: artifacts/hybrid/backtest_report.json

slow_model:
  hidden_layer_sizes: [64, 32]
  alpha: 0.0002

fast_model:
  hidden_dim: 28
  lr: 0.001
  epochs: 40

fusion:
  slow_weight: 0.58
  fast_weight: 0.42

risk_gate:
  warning_vol: 0.0015
  block_vol: 0.0023
  warning_anomaly: 2.2
  block_anomaly: 3.3
  warning_leverage: 0.45

backtest:
  score_to_pos: 80.0
  max_position: 1.0
  max_turnover_step: 0.30
  cooldown_steps: 7
  tx_cost_bps: 1.5
  slippage_bps: 0.75
  latency_steps: 1
