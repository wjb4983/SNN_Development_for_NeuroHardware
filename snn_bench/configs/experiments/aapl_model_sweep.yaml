defaults:
  ticker: AAPL
  timeframe: 1D
  seed: 7
  deterministic: true
  smoke:
    enabled: true
    sample_size: 256
    epochs: 1
  hardware:
    target_profile: loihi2_like
    quantization: 8
    max_neurons_per_layer: 4096
    supported_ops: [linear, lif, readout]

runs:
  - name: aapl_naive_persistence_smoke
    model:
      name: naive_persistence
      params:
        confidence: 0.7

  - name: aapl_logreg_smoke
    model:
      name: logreg
      params:
        max_iter: 200

  - name: aapl_gbm_smoke
    model:
      name: gbm
      params:
        n_estimators: 60
        learning_rate: 0.05

  - name: aapl_mlp_smoke
    epochs: 2
    batch_size: 32
    model:
      name: mlp
      params:
        epochs: 2
        batch_size: 32
        lr: 0.001

  - name: aapl_snntorch_lif_smoke
    epochs: 2
    batch_size: 32
    model:
      name: snntorch_lif
      params:
        hidden_dim: 32
        epochs: 2
        batch_size: 32
        lr: 0.001
        backend:
          surrogate_family: tanh
          reset_policy: zero

  - name: aapl_snntorch_alif_smoke
    epochs: 2
    batch_size: 32
    model:
      name: snntorch_alif
      params:
        hidden_sizes: [48]
        depth: 1
        dropout: 0.05
        surrogate_type: sigmoid
        reset_mode: subtract
        lr: 0.001
        backend:
          surrogate_family: sigmoid
          reset_policy: subtract

  - name: aapl_norse_recurrent_lsnn_smoke
    epochs: 2
    batch_size: 32
    model:
      name: norse_recurrent_lsnn
      params:
        hidden_sizes: [40]
        depth: 1
        dropout: 0.0
        surrogate_type: fast_sigmoid
        reset_mode: zero
        lr: 0.001
        backend:
          recurrent_cell_type: lsnn
          surrogate_family: fast_sigmoid
          reset_policy: zero

  - name: aapl_spikingjelly_temporal_conv_smoke
    epochs: 2
    batch_size: 32
    model:
      name: spikingjelly_temporal_conv
      params:
        hidden_sizes: [32]
        depth: 1
        dropout: 0.1
        surrogate_type: tanh
        reset_mode: zero
        lr: 0.001
        backend:
          event_encoding_mode: temporal
          surrogate_family: tanh
          reset_policy: zero

  - name: aapl_lava_lif_smoke
    epochs: 2
    batch_size: 32
    model:
      name: lava_lif
      params:
        hidden_sizes: [32]
        depth: 1
        dropout: 0.0
        lr: 0.001
        backend:
          event_encoding_mode: delta
          reset_policy: zero
