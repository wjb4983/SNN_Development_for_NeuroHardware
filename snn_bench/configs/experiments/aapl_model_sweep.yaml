defaults:
  ticker: AAPL
  timeframe: 1D
  seed: 7
  deterministic: true
  smoke:
    enabled: true
    sample_size: 256
    epochs: 1

runs:
  - name: aapl_logreg_smoke
    model:
      name: logreg
      params:
        max_iter: 200

  - name: aapl_mlp_smoke
    epochs: 2
    batch_size: 32
    model:
      name: mlp
      params:
        epochs: 2
        batch_size: 32
        lr: 0.001

  - name: aapl_snntorch_lif_smoke
    epochs: 2
    batch_size: 32
    model:
      name: snntorch_lif
      params:
        hidden_dim: 32
        epochs: 2
        batch_size: 32
        lr: 0.001
