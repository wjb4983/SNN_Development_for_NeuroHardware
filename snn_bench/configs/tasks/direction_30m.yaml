task_name: direction_30m_distribution
enabled: true
type: classification
horizon_minutes: 30
labeling:
  direction:
    neutral_band_bps: 5.0
    classes: [down, neutral, up]
  distribution:
    method: quantile_bins
    bins: 5
    fit_on: train_only
evaluation:
  primary_ml_metric: roc_auc
  primary_trading_metric: sharpe
  confidence_threshold: 0.55
  cost_model:
    fee_bps: 1.0
    spread_bps: 1.2
    impact_coef: 0.2
  ml_metrics: [auc, f1, logloss, brier, calibration]
  trading_metrics: [net_pnl, sharpe, sortino, max_drawdown, turnover]
  acceptance_thresholds:
    ml:
      roc_auc_min: 0.56
      f1_min: 0.53
    trading:
      sharpe_min: 0.35
      max_drawdown_min: -0.09
  periods_per_year: 3276
