ticker: AAPL
timeframe: 1D
batch_size: 32
epochs: 1
seed: 7
deterministic: true
run_name: default
model:
  name: mlp
  params:
    epochs: 1
    batch_size: 32
    lr: 0.001
smoke:
  enabled: false
  sample_size: 512
  epochs: 1
data_paths:
  snapshot_dir: src/data
  external_snapshot_dir: ../stoptions_analyzer/src/data
  backtest_root: src/data/backtest_cache
hardware:
  target_profile: loihi2_like
  quantization: 8
  max_neurons_per_layer: 2048
  supported_ops: [linear, lif, readout]
