ticker: AAPL
timeframe: 1D
run_name: aapl_smoke
seed: 7
model:
  name: snntorch_lif
  params:
    hidden_dim: 32
    lr: 0.001
    batch_size: 32
    epochs: 2
    backend:
      surrogate_family: tanh
      reset_policy: zero
smoke:
  enabled: true
  sample_size: 256
  epochs: 1

hardware:
  target_profile: generic_edge_neuromorphic
  quantization: 6
  max_neurons_per_layer: 1024
  supported_ops: [linear, lif, readout]
